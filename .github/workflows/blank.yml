name: Daily Hosts Update & Load Balance Test

# 触发规则：每日UTC 0点触发 + 手动触发
on:
  schedule:
    - cron: '0 0 * * *'  # 每天凌晨（UTC）执行，对应北京时间8点
  workflow_dispatch:     # 支持手动触发

jobs:
  update-hosts:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 授予提交代码的权限
    steps:
      - name: Checkout 仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史，避免提交失败

      - name: 安装依赖（JDK + Kotlin）
        run: |
          sudo apt-get update && sudo apt-get install -y openjdk-21-jdk kotlin
          # 验证安装
          java -version
          kotlinc -version

      - name: 创建 IP 检测 & Hosts 生成脚本
        run: |
          # 生成核心 Kotlin 脚本：解析IP + 检测 + 生成Hosts
          cat > HostsGenerator.kt << 'EOF'
          import java.net.InetSocketAddress
          import java.net.Socket
          import java.nio.file.Files
          import java.nio.file.Paths
          import java.util.*
          import java.util.regex.Pattern

          // ===================== 核心配置 =====================
          const val TARGET_HOSTS_FILE = "ehhosts.txt"  // 生成的Hosts文件名
          const val CONNECT_TIMEOUT = 3000L            // IP检测超时时间（ms）
          const val EH_HOSTS_PATH = "app/src/main/java/com/hippo/ehviewer/client/EhHosts.kt"  // 源文件路径

          // ===================== 工具函数 =====================
          /**
           * 解析 EhHosts.kt 中的内置 IP 列表
           * 返回格式：Map<域名, 原始IP列表>
           */
          fun parseEhHosts(): Map<String, List<String>> {
              val ipMap = mutableMapOf<String, MutableList<String>>()
              if (!Files.exists(Paths.get(EH_HOSTS_PATH))) {
                  println("❌ 未找到 EhHosts.kt 文件: $EH_HOSTS_PATH")
                  return ipMap
              }

              val content = Files.readString(Paths.get(EH_HOSTS_PATH))
              // 匹配 put(map, "域名", "ip1", "ip2", ...) 格式
              val pattern = Pattern.compile("put\\(map, \"([^\"]+)\",([^)]+)\\)")
              val matcher = pattern.matcher(content)

              while (matcher.find()) {
                  val host = matcher.group(1)
                  val ipsPart = matcher.group(2)
                  // 提取所有IP（匹配IPv4/IPv6）
                  val ipPattern = Pattern.compile("\"([0-9a-fA-F:.]+)\"")
                  val ipMatcher = ipPattern.matcher(ipsPart)
                  val ips = mutableListOf<String>()
                  while (ipMatcher.find()) {
                      val ip = ipMatcher.group(1).trim()
                      if (ip.isNotBlank()) ips.add(ip)
                  }
                  if (ips.isNotEmpty()) ipMap[host] = ips.distinct().toMutableList()
              }
              println("✅ 解析到 ${ipMap.size} 个域名的IP列表")
              return ipMap
          }

          /**
           * 检测单个IP的连通性和延迟
           * 返回：Pair(是否可用, 延迟ms)，延迟=-1表示不可用
           */
          fun testIpConnectivity(ip: String): Pair<Boolean, Long> {
              return try {
                  val startTime = System.currentTimeMillis()
                  Socket().use { socket ->
                      socket.connect(InetSocketAddress(ip, 443), CONNECT_TIMEOUT.toInt())
                      val latency = System.currentTimeMillis() - startTime
                      Pair(true, latency)
                  }
              } catch (e: Exception) {
                  Pair(false, -1)
              }
          }

          /**
           * 对每个域名的IP列表做负载均衡筛选，返回最优IP（延迟最低）
           */
          fun getBestIpPerHost(rawIpMap: Map<String, List<String>>): Map<String, String> {
              val bestIpMap = mutableMapOf<String, String>()
              rawIpMap.forEach { (host, ips) ->
                  println("🔍 检测域名 $host 的 IP 列表: $ips")
                  val ipLatencyList = mutableListOf<Pair<String, Long>>()
                  
                  // 并行检测IP（提升效率）
                  ips.parallelStream().forEach { ip ->
                      val (isAvailable, latency) = testIpConnectivity(ip)
                      if (isAvailable) {
                          ipLatencyList.add(Pair(ip, latency))
                          println("   ✅ IP $ip 可用，延迟: $latency ms")
                      } else {
                          println("   ❌ IP $ip 不可用")
                      }
                  }
                  
                  // 选择延迟最低的IP
                  if (ipLatencyList.isNotEmpty()) {
                      val bestIp = ipLatencyList.minBy { it.second }
                      bestIpMap[host] = bestIp.first
                      println("✅ 域名 $host 最优IP: ${bestIp.first} (延迟 ${bestIp.second} ms)")
                  } else {
                      bestIpMap[host] = ips.first()  // 无可用IP时取第一个原始IP
                      println("⚠️  域名 $host 无可用IP，使用原始第一个IP: ${ips.first()}")
                  }
              }
              return bestIpMap
          }

          /**
           * 生成标准 Hosts 文件内容
           * 格式：IP 域名
           */
          fun generateHostsFile(bestIpMap: Map<String, String>): String {
              val hostsContent = StringBuilder()
              // Hosts 文件头部注释
              hostsContent.append("""
                  # EHViewer 最优IP Hosts 文件
                  # 自动生成时间: ${Date()}
                  # 生成规则: 负载均衡（延迟最低优先）
                  # 来源: EhHosts.kt 内置IP列表检测
                  
              """.trimIndent())
              
              // 写入IP-域名映射（按域名排序，便于阅读）
              bestIpMap.entries.sortedBy { it.key }.forEach { (host, ip) ->
                  hostsContent.append("$ip\t$host\n")
              }
              
              return hostsContent.toString()
          }

          /**
           * 主函数：完整流程
           */
          fun main() {
              // 1. 解析原始IP列表
              val rawIpMap = parseEhHosts()
              if (rawIpMap.isEmpty()) {
                  println("❌ 未解析到任何IP列表，终止流程")
                  return
              }

              // 2. 筛选最优IP
              val bestIpMap = getBestIpPerHost(rawIpMap)

              // 3. 生成Hosts文件
              val hostsContent = generateHostsFile(bestIpMap)
              Files.writeString(Paths.get(TARGET_HOSTS_FILE), hostsContent)
              println("✅ 已生成 Hosts 文件: $TARGET_HOSTS_FILE")
              println("📄 Hosts 文件内容:\n$hostsContent")
          }

          // 执行主函数
          fun run() {
              main()
          }

          // 启动脚本
          run()
          EOF

      - name: 运行脚本生成最优 Hosts 文件
        run: |
          # 编译并运行 Kotlin 脚本
          kotlinc HostsGenerator.kt -include-runtime -d HostsGenerator.jar
          java -jar HostsGenerator.jar

      - name: 配置 Git 提交信息
        run: |
          # 配置Git用户（用于提交代码）
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: 提交 Hosts 文件到仓库
        run: |
          # 检查 Hosts 文件是否有变更
          if git status | grep -q "$TARGET_HOSTS_FILE"; then
              # 添加文件到暂存区
              git add $TARGET_HOSTS_FILE
              # 提交并推送
              git commit -m "chore: 每日更新最优 Hosts 文件 $(date +%Y-%m-%d)"
              git push origin HEAD:${{ github.ref_name }}
              echo "✅ Hosts 文件已提交并推送到仓库"
          else
              echo "ℹ️  Hosts 文件无变更，无需提交"
          fi

      - name: 上传 Hosts 文件作为构建产物
        uses: actions/upload-artifact@v4
        with:
          name: daily-optimized-hosts
          path: ehhosts.txt  # 与脚本中 TARGET_HOSTS_FILE 一致
