name: 自动生成优化版EhViewer Hosts

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时执行
  workflow_dispatch:       # 手动触发

jobs:
  generate-hosts:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: './requirements.txt'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install requests urllib3

      - name: 提取IP并生成Hosts
        run: python extract_and_test.py

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: ehviewer-optimized-hosts
          path: ./optimized_hosts.txt
          retention-days: 7
