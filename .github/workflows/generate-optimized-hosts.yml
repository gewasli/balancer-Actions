name: 生成EhViewer Hosts（支持IPv4/IPv6）

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时自动执行
  workflow_dispatch:       # 手动触发

jobs:
  generate-hosts:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出仓库（根目录）
      - name: 检出代码仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2. 配置Python环境
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # 3. 安装依赖
      - name: 安装Python依赖
        run: |
          pip install --upgrade pip
          pip install requests urllib3

      # 4. 运行脚本生成hosts（输出到根目录）
      - name: 生成EhViewer Hosts文件
        run: python extract_and_test.py

      # 5. 上传hosts文件到Artifacts（方便下载）
      - name: 上传Hosts产物
        uses: actions/upload-artifact@v4
        with:
          name: ehviewer-optimized-hosts
          path: ./ehviewer_optimized_hosts.txt  # 根目录文件
          retention-days: 7

      # 6. 可选：将hosts文件推送到仓库根目录（持久化保存）
      - name: 推送Hosts文件到仓库
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add ./ehviewer_optimized_hosts.txt
          git commit -m "Auto update EhViewer hosts $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push origin main || echo "Push failed (no changes)"
