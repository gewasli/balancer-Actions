name: 自动生成优化版EhViewer Hosts

# 触发条件：每6小时自动执行 + 手动触发
on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时执行一次
  workflow_dispatch:       # 手动触发

jobs:
  generate-hosts:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码仓库
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2. 配置Python环境
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: './requirements.txt'

      # 3. 安装依赖
      - name: 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 运行脚本生成优化hosts
      - name: 提取并测试IP，生成Hosts
        run: python extract_and_test.py

      # 5. 上传hosts文件作为产物（可直接下载）
      - name: 上传优化版Hosts
        uses: actions/upload-artifact@v4
        with:
          name: ehviewer-optimized-hosts
          path: ./optimized_hosts.txt
          retention-days: 7  # 产物保留7天

      # 6. 可选：自动发布为GitHub Release
      - name: 创建Release
        if: github.event_name == 'schedule'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: optimized-hosts-${{ github.run_id }}
          name: "优化版Hosts - ${{ github.run_date }}"
          body: |
            自动生成的EhViewer优化Hosts文件
            - 基于EhHosts.kt的内置IP列表
            - 每个域名选择访问速度最快的IP
            - 更新时间: ${{ github.run_date }}
          files: ./optimized_hosts.txt
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
