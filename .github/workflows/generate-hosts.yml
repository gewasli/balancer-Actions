name: 自动生成EhViewer Hosts

# 触发条件：定时（每6小时）+ 手动触发 + 仓库推送
on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时执行一次
  workflow_dispatch:       # 手动触发
  push:
    branches: [ main ]     # 推送main分支时触发（可选）

jobs:
  generate-hosts:
    runs-on: ubuntu-latest  # 使用Ubuntu环境（ping命令可用）
    steps:
      # 1. 拉取代码仓库
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 设置Python环境
      - name: 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'  # 缓存依赖

      # 3. 安装依赖
      - name: 安装依赖包
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 运行脚本生成hosts文件
      - name: 生成Hosts文件
        run: python generate_hosts.py

      # 5. 上传hosts文件为Action产物（便于下载）
      - name: 上传Hosts产物
        uses: actions/upload-artifact@v4
        with:
          name: ehviewer-hosts
          path: ./generated_hosts
          retention-days: 7  # 产物保留7天

      # 6. 可选：自动发布为GitHub Release
      - name: 创建Release
        if: github.event_name == 'schedule'  # 仅定时任务触发时发布
        uses: softprops/action-gh-release@v2
        with:
          tag_name: hosts-$(date +%Y%m%d%H%M)
          name: "自动更新Hosts - $(date +%Y-%m-%d %H:%M)"
          body: |
            自动生成的EhViewer最优IP Hosts配置
            更新时间: $(date +%Y-%m-%d %H:%M:%S)
          files: ./generated_hosts
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # GitHub自动提供的Token
